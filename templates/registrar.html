{% extends "base.html" %}

{% block content %}
<div class="p-4">
    <h2 class="mb-4">📝 Registrar Nuevo Producto</h2>
    
    <form action="/registrar" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Nombre del Producto</label>
            <input type="text" name="nombre" class="form-control shadow-sm" placeholder="Ej: Monitor Gamer 24'" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Categoría</label>
            <input type="text" name="categoria" class="form-control shadow-sm" placeholder="Ej: Periféricos" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Precio ($)</label>
                <input type="number" step="0.01" name="precio" class="form-control shadow-sm" placeholder="0.00" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Stock Inicial</label>
                <input type="number" name="stock" class="form-control shadow-sm" placeholder="Cantidad" required>
            </div>
        </div>

        <div class="mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-success me-2 shadow">
                💾 Guardar Producto
            </button>
            <a href="/" class="btn btn-danger shadow">
                ✖️ Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
