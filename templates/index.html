{% extends 'base.html' %}
{% block content %}
<h2>Lista de Productos</h2>
<a href="/registrar" class="btn btn-success mb-3">Añadir Producto</a>
<table class="table table-striped bg-white shadow-sm">
    <thead>
        <tr>
            <th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.nombre }}</td><td>{{ p.categoria }}</td><td>${{ p.precio }}</td><td>{{ p.stock }}</td>
            <td>
                <a href="/editar/{{ p.id }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/eliminar/{{ p.id }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Borrar?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
